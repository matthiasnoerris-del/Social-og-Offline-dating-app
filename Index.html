<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aalborg Offline Dating & Events</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 15px;
        }
        header {
            text-align: center;
            padding: 20px 0;
        }
        header h1 {
            margin: 0;
            color: #ff4757;
            font-size: 24px;
        }
        header p {
            margin: 5px 0 0 0;
            color: #555;
            font-size: 14px;
        }
        .event-list {
            max-width: 500px;
            margin: 0 auto;
        }
        .event-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .tag {
            background: #ffe0e2;
            color: #ff4757;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 8px;
        }
        .titel {
            font-size: 18px;
            font-weight: bold;
            margin: 0 0 5px 0;
            color: #222;
        }
        .dato {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }
        .knap {
            display: block;
            text-align: center;
            background: #ff4757;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Aalborg Offline 🍻</h1>
        <p>Hvad sker der i byen lige nu?</p>
    </header>

    <div class="event-list" id="event-beholder">
        <!-- Begivenhederne bliver sat ind her automatisk -->
    </div>

    <script>
        // Her henter vi dataen fra din JSON-fil
        fetch('events.json')
            .then(response => response.json())
            .then(data => {
                const beholder = document.getElementById('event-beholder');
                
                data.forEach(event => {
                    const card = document.createElement('div');
                    card.className = 'event-card';
                    card.innerHTML = `
                        <span class="tag">${event.sted}</span>
                        <div class="titel">${event.titel}</div>
                        <div class="dato">📅 ${event.dato}</div>
                        <a href="${event.link}" target="_blank" class="knap">Se på Facebook</a>
                    `;
                    beholder.appendChild(card);
                });
            })
            .catch(error => console.error('Fejl ved hentning af events:', error));
    </script>
</body>
</html>
