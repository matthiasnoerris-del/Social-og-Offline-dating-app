name: Hent nye Facebook Events automatisk

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Disse linjer sikrer, at robotten har fuld adgang til at opdatere din hjemmeside!
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  opdater-events:
    runs-on: ubuntu-latest
    steps:
    - name: Hent koden fra repository
      uses: actions/checkout@v3

    - name: Sæt Python op
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installer nødvendige pakker
      run: |
        pip install requests

    - name: Kør scriptet der henter Facebook events
      run: python hent_events.py

    - name: Gem ændringer i events.json
      run: |
        git config --global user.name 'GitHub Actions Robot'
        git config --global user.email 'actions@github.com'
        git add events.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automatisk opdatering af begivenheder" && git push)

    # Vi bruger en opdateret og mere stabil version af udrulnings-robotten her
    - name: Upload det færdige design til Pages
      uses: actions/upload-pages-artifact@v2
      with:
        path: '.'

    - name: Tving GitHub Pages til at opdatere appen live
      uses: actions/deploy-pages@v2
