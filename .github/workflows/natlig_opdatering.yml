name: Hent nye Facebook Events automatisk

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  opdater-events:
    runs-on: ubuntu-latest
    steps:
    - name: Hent koden fra repository
      uses: actions/checkout@v4

    - name: Sæt Python op
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installer nødvendige pakker
      run: |
        pip install requests

    - name: Kør scriptet der henter Facebook events
      run: python hent_events.py

    - name: Gem ændringer i events.json
      run: |
        git config --global user.name 'GitHub Actions Robot'
        git config --global user.email 'actions@github.com'
        git add events.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automatisk opdatering af begivenheder" && git push)

    # Her bruger vi den spritnye v4 upload-metode
    - name: Upload det færdige design til Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    # Her bruger vi den nyeste udrulnings-metode
    - name: Tving GitHub Pages til at opdatere appen live
      uses: actions/deploy-pages@v4
