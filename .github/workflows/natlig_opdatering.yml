name: Hent nye Facebook Events automatisk

on:
  schedule:
    # Denne linje betyder: Kør automatisk hver nat kl. 03:00
    - cron: '0 3 * * *'
  workflow_dispatch: # Gør det muligt for dig at starte robotten manuelt med ét klik

jobs:
  opdater-events:
    runs-on: ubuntu-latest
    steps:
    - name: Hent koden fra repository
      uses: actions/checkout@v3

    - name: Sæt Python op
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Installer nødvendige pakker
      run: |
        pip install requests

    - name: Kør scriptet der henter Facebook events
      run: python hent_events.py

    - name: Gem ændringer og opdater appen på GitHub
      run: |
        git config --global user.name 'GitHub Actions Robot'
        git config --global user.email 'actions@github.com'
        git add events.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automatisk opdatering af begivenheder" && git push)
